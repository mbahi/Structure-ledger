<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Ledger — SMC/AMD Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Your existing styles remain unchanged until the new additions */
  :root{
    --ink:#0e1116; --ledger:#161b22; --ledger2:#11151b; --line:#252c36;
    --paper:#e9e2d0; --brass:#c9a227; --steel:#5b7c99;
    --grey-acc:#6b7178; --red-acc:#b5484d; --green-acc:#3f8f6f;
    --text:#e6e2d6; --dim:#8b93a1; --faint:#525c69;
    --serif:'Fraunces', serif; --sans:'Inter', -apple-system, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }
  /* ... (all your original CSS stays the same) ... */

  /* === NEW STYLES === */
  .confluence-bar {
    height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 10px 0;
  }
  .confluence-fill {
    height: 100%; transition: width 0.4s ease;
  }
  .filter-panel {
    background:var(--ledger); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:12px;
    font-family:var(--mono); font-size:11px; color:var(--dim);
  }
  .status-detail { font-size: 10px; margin-left: 8px; color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header with improved status -->
  <header>
    <div>
      <div class="brand">Structure <span>Ledger</span></div>
      <div class="sub">SMC / AMD monitor · decision support, not execution</div>
    </div>
    <div class="controls">
      <!-- Your existing controls ... -->
      <div class="status">
        <span class="pulse" id="pulse"></span>
        <span id="statustxt">connecting…</span>
        <span class="status-detail" id="latency">— ms</span>
      </div>
    </div>
  </header>

  <!-- Your existing read-first and RULE 11 sections remain the same -->

  <!-- NEW: Filter Panel -->
  <div class="filter-panel">
    <strong>Filters</strong> 
    <label><input type="checkbox" id="filterMinRR" checked> Min R:R 1.0</label>
    <label><input type="checkbox" id="filterNews" checked> Avoid high-impact news</label>
    <span id="activeFilters" style="margin-left:15px; color:var(--brass); font-size:10px;"></span>
  </div>

  <!-- Rest of your HTML (mtfstrip, quote-row, etc.) remains unchanged -->

  <!-- In the ticket rendering area we'll enhance it below in JS -->

<script>
(() => {
  // === YOUR ORIGINAL CODE (kept intact with additions) ===
  const APP_ID = 1089;
  const WS_URL = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;
  // ... (all your existing variables and functions stay the same) ...

  // === NEW: Confluence Score Calculator ===
  function calculateConfluenceScore(ticket, strategy) {
    if (!ticket) return 0;
    let score = 60; // base
    if (ticket.rr1 >= 1.5) score += 15;
    if (ticket.rr2 >= 2.5) score += 10;
    // Add more factors as you expand (HTF alignment, session, etc.)
    if (strategy === 'fvg') score += 15; // your strongest
    return Math.min(100, Math.max(40, score));
  }

  // === UPDATED renderTicket with Confluence + Better UX ===
  function renderTicket(t) {
    const slot = $('ticketslot');
    if (!t) {
      // Your existing idle message logic...
      slot.innerHTML = `<div class="idle-ticket">Reading structure — no confluence yet on this timeframe.</div>`;
      return;
    }

    const d = t.decimals;
    const bias = t.dir === 'bull' ? 'Bullish' : 'Bearish';
    const isDisclosed = disclosedKey === t.key;
    const confScore = calculateConfluenceScore(t, curStrategy);

    slot.innerHTML = `
      <div class="ticket ${t.dir==='bear'?'bear':''}">
        <div class="ticket-head">
          <div>
            <div class="ticket-title">Setup Ticket</div>
            <div class="ticket-tf">${$('symlabel').textContent} · ${effectiveTfLabel()} · ${strategyLabel()}</div>
          </div>
          <div class="ticket-bias ${t.dir}">${bias} · ${t.label}</div>
        </div>

        <!-- NEW: Confluence Score -->
        <div style="margin:12px 0 16px;">
          <div style="font-size:9.5px; color:#5a5340; margin-bottom:4px;">CONFLUENCE SCORE</div>
          <div class="confluence-bar">
            <div class="confluence-fill" style="width:${confScore}%; background:linear-gradient(90deg, #3f8f6f, #c9a227);"></div>
          </div>
          <div style="font-size:11px; color:${confScore>75?'#3f8f6f':'#c9a227'};">${confScore}% — ${confScore>80?'High Probability':confScore>65?'Good':'Moderate'}</div>
        </div>

        <div class="ticket-grid">
          <!-- Your existing fields -->
          <div class="tfield"><div class="k">Entry</div><div class="v">${t.entry.toFixed(d)}</div></div>
          <div class="tfield"><div class="k">Stop Loss</div><div class="v">${t.sl.toFixed(d)}</div></div>
          <div class="tfield"><div class="k">TP1 (close 50%)</div><div class="v">${t.tp1.toFixed(d)}</div></div>
          <div class="tfield"><div class="k">TP2 (SL→BE)</div><div class="v">${t.tp2.toFixed(d)}</div></div>
        </div>
        <div class="ticket-rr">R:R to TP1 ≈ ${t.rr1.toFixed(2)}   ·   R:R to TP2 ≈ ${t.rr2.toFixed(2)}</div>

        <!-- Your lot calc and actions remain the same -->

        <div class="ticket-actions">
          <button class="tbtn" id="copyBtn">Copy disclosure</button>
          <button class="tbtn ${isDisclosed?'done':''}" id="discloseBtn" ${isDisclosed?'disabled':''}>${isDisclosed?'Disclosed ✓':'Mark disclosed'}</button>
        </div>
        <div class="ticket-note">High confluence setups are now scored. Always verify manually.</div>
      </div>`;

    // Re-attach your existing event listeners (copy, disclose, lot size)...
    // (Keep your original logic here)
  }

  // === NEW: Enhanced Notification ===
  function sendSetupNotification(ticket) {
    if (!notifyEnabled || Notification.permission !== "granted") return;
    if (calculateConfluenceScore(ticket, curStrategy) < 70) return; // only strong ones

    new Notification(`🚨 Strong ${strategyLabel()} Setup`, {
      body: `${$('symlabel').textContent} | ${ticket.dir.toUpperCase()} ${ticket.label}\nEntry ${ticket.entry.toFixed(ticket.decimals)}`,
      tag: 'structure-ledger-setup'
    });
  }

  // Call sendSetupNotification(ticket) inside renderAll() when a good ticket appears

  // Initialize
  connect();
})();
</script>
</body>
</html>
